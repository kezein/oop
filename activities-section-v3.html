Atm.<span class="fn">withdraw</span>(<span class="num">2000</span>);\n        myAtm.<span class="fn">checkBalance</span>();\n    }\n}',

      code: '<span class="cm">// Decision Structures — Kezia Lorein Villegas</span>\n<span class="kw">import</span> java.util.Scanner;\n\n<span class="kw">public class</span> <span class="cls">GradeCheck</span> {\n    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {\n        Scanner sc = <span class="kw">new</span> Scanner(System.in);\n        System.out.print(<span class="str">"Enter your score: "</span>);\n        <span class="kw">int</span> score = sc.<span class="fn">nextInt</span>();\n\n        String grade;\n        <span class="kw">if</span> (score >= <span class="num">90</span>) {\n            grade = <span class="str">"A"</span>;\n        } <span class="kw">else if</span> (score >= <span class="num">80</span>) {\n            grade = <span class="str">"B"</span>;\n        } <span class="kw">else if</span> (score >= <span class="num">70</span>) {\n            grade = <span class="str">"C"</span>;\n        } <span class="kw">else if</span> (score >= <span class="num">60</span>) {\n            grade = <span class="str">"D"</span>;\n        } <span class="kw">else</span> {\n            grade = <span class="str">"F"</span>;\n        }\n        System.out.println(<span class="str">"Your grade is: "</span> + grade);\n\n        <span class="cm">// Switch: Day of the week</span>\n        System.out.print(<span class="str">"Enter day number (1-7): "</span>);\n        <span class="kw">int</span> day = sc.<span class="fn">nextInt</span>();\n        <span class="kw">switch</span> (day) {\n            <span class="kw">case</span> <span class="num">1</span>: System.out.println(<span class="str">"Monday"</span>); <span class="kw">break</span>;\n            <span class="kw">case</span> <span class="num">2</span>: System.out.println(<span class="str">"Tuesday"</span>); <span class="kw">break</span>;\n            <span class="kw">case</span> <span class="num">3</span>: System.out.println(<span class="str">"Wednesday"</span>); <span class="kw">break</span>;\n            <span class="kw">case</span> <span class="num">4</span>: System.out.println(<span class="str">"Thursday"</span>); <span class="kw">break</span>;\n            <span class="kw">case</span> <span class="num">5</span>: System.out.println(<span class="str">"Friday"</span>); <span class="kw">break</span>;\n            <span class="kw">case</span> <span class="num">6</span>: System.out.println(<span class="str">"Saturday"</span>); <span class="kw">break</span>;\n            <span class="kw">case</span> <span class="num">7</span>: System.out.println(<span class="str">"Sunday"</span>); <span class="kw">break</span>;\n            <span class="kw">default</span>: System.out.println(<span class="str">"Invalid day."</span>);\n        }\n    }\n}',

>4</span>));\n        System.out.println(<span class="str">"Multiply: "</span>     + <span class="fn">multiply</span>(<span class="num">3</span>, <span class="num">5</span>));\n        System.out.println(<span class="str">"Divide: "</span>       + <span class="fn">divide</span>(<span class="num">10</span>, <span class="num">2</span>));\n    }\n}',

      code: '<span class="cm">// Inheritance — Kezia Lorein Villegas</span>\n<span class="kw">class</span> <span class="cls">Animal</span> {\n    String name;\n\n    <span class="cls">Animal</span>(String name) {\n        <span class="kw">this</span>.name = name;\n    }\n\n    <span class="kw">void</span> <span class="fn">speak</span>() {\n        System.out.println(name + <span class="str">" makes a sound."</span>);\n    }\n}\n\n<span class="kw">class</span> <span class="cls">Dog</span> <span class="kw">extends</span> <span class="cls">Animal</span> {\n    <span class="cls">Dog</span>(String name) {\n        <span class="kw">super</span>(name);\n    }\n\n    <span class="kw">void</span> <span class="fn">speak</span>() {\n        System.out.println(name + <span class="str">" says: Woof!"</span>);\n    }\n}\n\n<span class="kw">class</span> <span class="cls">GuideDog</span> <span class="kw">extends</span> <span class="cls">Dog</span> {\n    <span class="cls">GuideDog</span>(String name) {\n        <span class="kw">super</span>(name);\n    }\n\n    <span class="kw">void</span> <span class="fn">guide</span>() {\n        <span class="kw">super</span>.<span class="fn">speak</span>();\n        System.out.println(name + <span class="str">" is guiding its owner."</span>);\n    }\n}\n\n<span class="kw">public class</span> <span class="cls">InheritanceDemo</span> {\n    <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {\n        <span class="cls">Animal</span> a = <span class="kw">new</span> <span class="cls">Animal</span>(<span class="str">"Cat"</span>);\n        <span class="cls">Dog</span>    d = <span class="kw">new</span> <span class="cls">Dog</span>(<span class="str">"Buddy"</span>);\n        <span class="cls">GuideDog</span> g = <span class="kw">new</span> <span class="cls">GuideDog</span>(<span class="str">"Max"</span>);\n\n        a.<span class="fn">speak</span>();\n        d.<span class="fn">speak</span>();\n        g.<span class="fn">guide</span>();\n    }\n}',

    doc.style.transform = 'rotate(' + act.rot + ')';

    doc.innerHTML =
      '<div class="arc-doc-inner" style="background:' + act.bg + '">' +
        '<div class="arc-header">' +
          '<span class="arc-dot-circle" style="background:#ff5f57"></span>' +
          '<span class="arc-dot-circle" style="background:#febc2e"></span>' +
          '<span class="arc-dot-circle" style="background:#28c840"></span>' +
          '<span style="font-size:0.46rem;color:rgba(255,255,255,0.25);margin-left:6px;font-family:Space Mono,monospace">' + act.filename + '</span>' +
        '</div>' +
        '<span class="arc-screen-preview">' + act.code + '</span>' +
        '<div class="arc-expand-hint">click to expand ↗</div>' +
        '<span class="arc-badge" style="background:' + act.accent + '22;color:' + act.accent + '">' + act.label + '</span>' +
      '</div>';

    doc.addEventListener('click', function(e) {
      e.stopPropagation();
      openLightbox(i);
    });

    wrap.appendChild(doc);
    docEls.push(doc);

    var dot = document.createElement('button');
    dot.className = 'arc-nav-dot';
    dot.addEventListener('click', function(e) { e.stopPropagation(); openLightbox(i); });
    dotsWrap.appendChild(dot);
  });

  function openLightbox(i) {
    currentIdx = i;
    var act = activities[i];

    lbCode.style.background  = act.bg;
    lbBar.style.background   = 'rgba(255,255,255,0.04)';
    lbFile.textContent        = act.filename;
    lbPre.innerHTML           = act.code;
    lbInfo.style.background   = act.accent;
    lbLabel.textContent       = act.label;
    lbTitle.textContent       = act.title;
    lbDesc.textContent        = act.desc;
    lbTags.innerHTML          = act.tags.map(function(t) {
      return '<span class="arc-tag">' + t + '</span>';
    }).join('');

    lb.style.display        = 'flex';
    document.body.style.overflow = 'hidden';

    dotsWrap.querySelectorAll('.arc-nav-dot').forEach(function(d, idx) {
      d.classList.toggle('arc-dot-active', idx === i);
    });
  }

  function closeLightbox() {
    lb.style.display = 'none';
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', function(e) {
    if (e.target === lb) closeLightbox();
  });

  lbPrev.addEventListener('click', function() {
    openLightbox((currentIdx - 1 + activities.length) % activities.length);
  });
  lbNext.addEventListener('click', function() {
    openLightbox((currentIdx + 1) % activities.length);
  });

  document.addEventListener('keydown', function(e) {
    if (lb.style.display === 'none') return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowRight') openLightbox((currentIdx + 1) % activities.length);
    if (e.key === 'ArrowLeft')  openLightbox((currentIdx - 1 + activities.length) % activities.length);
  });
})();
</script>
