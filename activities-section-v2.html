<section style="padding:0;margin:0;background:#0e0e0e;">
  <div id="archiveWrap" style="
    background:#0e0e0e;
    min-height:540px;
    height:540px;
    width:100%;
    position:relative;
    overflow:hidden;
    box-sizing:border-box;
  ">

    <!-- Labels -->
    <span style="
      position:absolute;top:1.5rem;left:2rem;
      font-family:'Syne',sans-serif;font-size:0.65rem;
      letter-spacing:0.15em;color:rgba(255,255,255,0.3);
      text-transform:uppercase;z-index:10;
    ">Midterm · Activities</span>

    <span style="
      position:absolute;top:2.6rem;left:2rem;
      font-family:'Syne',sans-serif;font-size:2rem;
      font-weight:800;color:#fff;z-index:10;line-height:1.1;
    ">Java Activities</span>

    <span style="
      position:absolute;bottom:1.5rem;left:2rem;
      font-family:'Space Mono',monospace;font-size:0.62rem;
      color:rgba(255,255,255,0.2);letter-spacing:0.08em;z-index:10;
    ">Click any card to inspect →</span>

    <div id="archiveNavDots" style="
      position:absolute;bottom:1.5rem;right:1.5rem;
      display:flex;gap:6px;z-index:10;
    "></div>

    <!-- Info Panel -->
    <div id="archiveInfoPanel" style="
      position:absolute;
      right:1.5rem;top:50%;
      transform:translateY(-50%) scale(0.9);
      width:200px;
      border-radius:12px;
      padding:1.1rem 1.2rem 1rem;
      z-index:100;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.25s, transform 0.3s cubic-bezier(.23,1,.32,1);
      box-sizing:border-box;
    ">
      <button id="archiveInfoClose" style="
        position:absolute;top:0.6rem;right:0.6rem;
        background:rgba(0,0,0,0.15);border:none;border-radius:50%;
        width:20px;height:20px;cursor:pointer;font-size:0.65rem;
        color:rgba(0,0,0,0.5);display:flex;align-items:center;
        justify-content:center;line-height:1;padding:0;
      ">✕</button>
      <div id="archivePanelLabel" style="
        font-family:'Space Mono',monospace;font-size:0.55rem;
        font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
        color:rgba(0,0,0,0.45);margin-bottom:0.35rem;
      "></div>
      <div id="archivePanelTitle" style="
        font-family:'Syne',sans-serif;font-size:1rem;
        font-weight:800;color:#111;margin-bottom:0.5rem;line-height:1.25;
      "></div>
      <div id="archivePanelDesc" style="
        font-family:'Space Mono',monospace;font-size:0.6rem;
        line-height:1.7;color:rgba(0,0,0,0.62);margin-bottom:0.75rem;
      "></div>
      <div id="archivePanelTags"></div>
    </div>

  </div>
</section>

<!-- ── Scoped styles for doc cards only ── -->
<style>
.archive-doc {
  position: absolute !important;
  cursor: pointer;
  transition: transform 0.35s cubic-bezier(.23,1,.32,1), box-shadow 0.3s;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 4px 6px 24px rgba(0,0,0,0.55);
  box-sizing: border-box;
}
.archive-doc:hover {
  box-shadow: 6px 10px 36px rgba(0,0,0,0.8);
  filter: brightness(1.08);
}
.archive-doc.arc-active {
  z-index: 50 !important;
  box-shadow: 8px 14px 48px rgba(0,0,0,0.85);
}
.arc-doc-inner {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  overflow: hidden;
}
.arc-header {
  padding: 0.5rem 0.8rem;
  display: flex !important;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
}
.arc-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.arc-screen {
  padding: 0.7rem 0.8rem;
  font-family: 'Space Mono', monospace !important;
  font-size: 0.5rem !important;
  line-height: 1.75 !important;
  color: rgba(255,255,255,0.75);
  white-space: pre;
  display: block;
}
.arc-screen .kw  { color: #c792ea; }
.arc-screen .cls { color: #82aaff; }
.arc-screen .str { color: #c3e88d; }
.arc-screen .cm  { color: rgba(255,255,255,0.28); }
.arc-screen .num { color: #f78c6c; }
.arc-screen .fn  { color: #89ddff; }
.arc-badge {
  display: inline-block;
  padding: 0.22rem 0.6rem;
  font-size: 0.5rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 4px;
  margin: 0.4rem 0.8rem 0.55rem;
  font-family: 'Space Mono', monospace;
}
.arc-nav-dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(255,255,255,0.18);
  border:none; cursor:pointer; padding:0;
  transition:background 0.2s;
}
.arc-nav-dot.arc-dot-active { background:#f5c842; }
.arc-tag {
  display: inline-block;
  background: rgba(0,0,0,0.12);
  color: rgba(0,0,0,0.6);
  font-family: 'Space Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.08em;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  font-weight: 700;
  text-transform: uppercase;
  margin-right: 4px;
  margin-bottom: 4px;
}
</style>

<!-- ── Script: add to script.js or paste before </body> ── -->
<script>
(function() {
  var activities = [
    {
      label:"Activity 1", title:"ATM Simulation",
      desc:"Encapsulation in action — private balance field accessed only through deposit(), withdraw(), and checkBalance() methods. Conditional logic validates every transaction.",
      tags:["Encapsulation","OOP","Java"],
      accent:"#c792ea", bg:"#1e1a2e",
      code:'<span class="cm">// ATM Simulation</span>\n<span class="kw">public class</span> <span class="cls">ATM</span> {\n  <span class="kw">private double</span> balance;\n\n  <span class="kw">public void</span> <span class="fn">deposit</span>(<span class="kw">double</span> amt) {\n    <span class="kw">if</span> (amt > <span class="num">0</span>) balance += amt;\n  }\n\n  <span class="kw">public void</span> <span class="fn">withdraw</span>(<span class="kw">double</span> amt) {\n    <span class="kw">if</span> (amt <= balance) balance -= amt;\n    <span class="kw">else</span> System.out.println(<span class="str">"Insufficient"</span>);\n  }\n}',
      left:"8%", top:"130px", rot:"-4deg", w:210, z:5
    },
    {
      label:"Activity 2", title:"Decision Structures",
      desc:"Explored if-else chains, switch statements, and nested conditionals to build a grade classifier and day-of-week program.",
      tags:["Control Flow","Switch","If-Else"],
      accent:"#82aaff", bg:"#111827",
      code:'<span class="cm">// Grade Classifier</span>\n<span class="kw">public class</span> <span class="cls">GradeCheck</span> {\n  <span class="kw">public static void</span> <span class="fn">main</span>(String[] a) {\n    <span class="kw">int</span> score = <span class="num">88</span>;\n    <span class="kw">switch</span> (score / <span class="num">10</span>) {\n      <span class="kw">case</span> <span class="num">9</span>: System.out.println(<span class="str">"A"</span>); <span class="kw">break</span>;\n      <span class="kw">case</span> <span class="num">8</span>: System.out.println(<span class="str">"B"</span>); <span class="kw">break</span>;\n      <span class="kw">default</span>: System.out.println(<span class="str">"C"</span>);\n    }\n  }\n}',
      left:"27%", top:"80px", rot:"2.5deg", w:205, z:4
    },
    {
      label:"Activity 3", title:"Methods in Java",
      desc:"Defined static and instance methods, explored return types, parameters, and method overloading to build a basic calculator class.",
      tags:["Methods","Overloading","Return Types"],
      accent:"#c3e88d", bg:"#121c0f",
      code:'<span class="cm">// Method Overloading</span>\n<span class="kw">public class</span> <span class="cls">Calc</span> {\n  <span class="kw">static int</span> <span class="fn">add</span>(<span class="kw">int</span> a, <span class="kw">int</span> b) {\n    <span class="kw">return</span> a + b;\n  }\n  <span class="kw">static double</span> <span class="fn">add</span>(<span class="kw">double</span> a, <span class="kw">double</span> b) {\n    <span class="kw">return</span> a + b;\n  }\n  <span class="kw">public static void</span> <span class="fn">main</span>(String[] a) {\n    System.out.println(<span class="fn">add</span>(<span class="num">2</span>, <span class="num">3</span>));\n    System.out.println(<span class="fn">add</span>(<span class="num">2.5</span>, <span class="num">1.1</span>));\n  }\n}',
      left:"47%", top:"110px", rot:"-2deg", w:210, z:3
    },
    {
      label:"Activity 4", title:"Inheritance",
      desc:"Built a class hierarchy — Animal → Dog → GuideDog — demonstrating multilevel inheritance, method overriding, and the super keyword.",
      tags:["Inheritance","super","Override"],
      accent:"#f78c6c", bg:"#1e1008",
      code:'<span class="cm">// Multilevel Inheritance</span>\n<span class="kw">class</span> <span class="cls">Animal</span> {\n  <span class="kw">void</span> <span class="fn">speak</span>() { System.out.println(<span class="str">"..."</span>); }\n}\n<span class="kw">class</span> <span class="cls">Dog</span> <span class="kw">extends</span> <span class="cls">Animal</span> {\n  <span class="kw">void</span> <span class="fn">speak</span>() { System.out.println(<span class="str">"Woof!"</span>); }\n}\n<span class="kw">class</span> <span class="cls">GuideDog</span> <span class="kw">extends</span> <span class="cls">Dog</span> {\n  <span class="kw">void</span> <span class="fn">guide</span>() {\n    <span class="kw">super</span>.<span class="fn">speak</span>();\n    System.out.println(<span class="str">"Guiding!"</span>);\n  }\n}',
      left:"15%", top:"295px", rot:"3deg", w:205, z:2
    },
    {
      label:"Activity 5", title:"Student Payment System",
      desc:"Full OOP capstone — Student class with encapsulated payment fields, methods for fee computation, receipt generation, and balance tracking.",
      tags:["Capstone","OOP","Encapsulation"],
      accent:"#f5c842", bg:"#1a1600",
      code:'<span class="cm">// Student Payment System</span>\n<span class="kw">public class</span> <span class="cls">Student</span> {\n  <span class="kw">private</span> String name;\n  <span class="kw">private double</span> balance;\n\n  <span class="kw">public void</span> <span class="fn">payFee</span>(<span class="kw">double</span> amt) {\n    balance -= amt;\n    System.out.println(<span class="str">"Paid: \u20b1"</span> + amt);\n  }\n\n  <span class="kw">public void</span> <span class="fn">printReceipt</span>() {\n    System.out.println(name + <span class="str">" | Bal: \u20b1"</span> + balance);\n  }\n}',
      left:"38%", top:"300px", rot:"-3.5deg", w:215, z:1
    }
  ];

  var wrap = document.getElementById('archiveWrap');
  var panel = document.getElementById('archiveInfoPanel');
  var dotsWrap = document.getElementById('archiveNavDots');
  if (!wrap || !panel || !dotsWrap) return;

  var activeIdx = null;
  var docEls = [];

  activities.forEach(function(act, i) {
    var doc = document.createElement('div');
    doc.className = 'archive-doc';
    doc.style.left = act.left;
    doc.style.top = act.top;
    doc.style.width = act.w + 'px';
    doc.style.zIndex = act.z;
    doc.style.transform = 'rotate(' + act.rot + ')';

    doc.innerHTML =
      '<div class="arc-doc-inner" style="background:' + act.bg + '">' +
        '<div class="arc-header">' +
          '<span class="arc-dot" style="background:#ff5f57"></span>' +
          '<span class="arc-dot" style="background:#febc2e"></span>' +
          '<span class="arc-dot" style="background:#28c840"></span>' +
          '<span style="font-size:0.48rem;color:rgba(255,255,255,0.25);margin-left:6px;font-family:Space Mono,monospace">' + act.label + '</span>' +
        '</div>' +
        '<span class="arc-screen">' + act.code + '</span>' +
        '<span class="arc-badge" style="background:' + act.accent + '22;color:' + act.accent + '">' + act.label + '</span>' +
      '</div>';

    doc.addEventListener('click', function(e) {
      e.stopPropagation();
      activeIdx === i ? closePanel() : openPanel(i);
    });

    wrap.appendChild(doc);
    docEls.push(doc);

    var dot = document.createElement('button');
    dot.className = 'arc-nav-dot';
    dot.addEventListener('click', function(e) { e.stopPropagation(); openPanel(i); });
    dotsWrap.appendChild(dot);
  });

  function openPanel(i) {
    activeIdx = i;
    var act = activities[i];

    docEls.forEach(function(d, idx) {
      d.classList.remove('arc-active');
      d.style.transform = idx === i
        ? 'rotate(0deg) scale(1.05)'
        : 'rotate(' + activities[idx].rot + ')';
      if (idx === i) d.classList.add('arc-active');
    });

    document.getElementById('archivePanelLabel').textContent = act.label;
    document.getElementById('archivePanelTitle').textContent = act.title;
    document.getElementById('archivePanelDesc').textContent = act.desc;
    document.getElementById('archivePanelTags').innerHTML = act.tags
      .map(function(t) { return '<span class="arc-tag">' + t + '</span>'; }).join('');

    panel.style.background = act.accent;
    panel.style.opacity = '1';
    panel.style.pointerEvents = 'all';
    panel.style.transform = 'translateY(-50%) scale(1)';

    dotsWrap.querySelectorAll('.arc-nav-dot').forEach(function(d, idx) {
      d.classList.toggle('arc-dot-active', idx === i);
    });
  }

  function closePanel() {
    activeIdx = null;
    panel.style.opacity = '0';
    panel.style.pointerEvents = 'none';
    panel.style.transform = 'translateY(-50%) scale(0.9)';
    docEls.forEach(function(d, idx) {
      d.classList.remove('arc-active');
      d.style.transform = 'rotate(' + activities[idx].rot + ')';
    });
    dotsWrap.querySelectorAll('.arc-nav-dot').forEach(function(d) {
      d.classList.remove('arc-dot-active');
    });
  }

  document.getElementById('archiveInfoClose').addEventListener('click', function(e) {
    e.stopPropagation(); closePanel();
  });
  wrap.addEventListener('click', closePanel);
})();
</script>
